<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KEYLON | Dívidas</title>

  <link rel="stylesheet" href="./assets/css/tokens.css" />
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-badge">KEYLON</span>
        <h2>Instituto</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./alunos.html" class="nav-link">Alunos</a>
        <a href="./cursos.html" class="nav-link">Cursos</a>
        <a href="./turmas.html" class="nav-link">Turmas</a>
        <a href="./cobrancas.html" class="nav-link">Cobranças</a>
        <a href="./pagamentos.html" class="nav-link">Pagamentos</a>
        <a href="./dividas.html" class="nav-link active">Dívidas</a>
      </nav>

      <button id="logout-btn" class="btn btn-ghost sidebar-logout">
        Terminar sessão
      </button>
    </aside>

    <div class="app-main">
      <div id="mobile-backdrop" class="mobile-backdrop"></div>
      <header class="topbar">
        <div>
          <h1>Dívidas</h1>
          <p class="page-subtitle">Resumo financeiro por aluno</p>
        </div>

        <div class="topbar-user">
          <span id="user-name">Utilizador</span>
        </div>
      </header>

      <main class="page-content">
        <section class="stats-grid" id="cards">
          <div class="stat-card">
            <span class="stat-label">Dívida total</span>
            <strong class="stat-value">0</strong>
          </div>

          <div class="stat-card">
            <span class="stat-label">Total pago</span>
            <strong class="stat-value">0</strong>
          </div>

          <div class="stat-card">
            <span class="stat-label">Devedores</span>
            <strong class="stat-value">0</strong>
          </div>

          <div class="stat-card stat-card-highlight">
            <span class="stat-label">Atrasados</span>
            <strong class="stat-value">0</strong>
          </div>
        </section>

        <article class="panel">
          <div class="panel-header panel-header-inline">
            <h3>Lista de devedores</h3>

            <div class="toolbar">
              <input
                type="text"
                id="search"
                placeholder="Pesquisar por aluno, turma ou curso"
                class="search-input"
              />
            </div>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Aluno</th>
                  <th>Curso</th>
                  <th>Turma</th>
                  <th>Total cobrado</th>
                  <th>Total pago</th>
                  <th>Dívida</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="dividas-table-body">
                <tr>
                  <td colspan="7" class="empty-cell">A carregar dívidas...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>
      </main>
    </div>
  </div>

  <script type="module">
    import { initDividas } from "./assets/js/modules/dividas.js";

    document.addEventListener("DOMContentLoaded", () => {
      initDividas();
    });
  </script>
</body>
</html>
