<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KEYLON | Turmas</title>

  <link rel="stylesheet" href="./assets/css/tokens.css" />
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
</head>

<body>
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-badge">KEYLON</span>
        <h2>Instituto</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./despesas.html" class="nav-link">Despesas</a>
        <a href="./inventario.html" class="nav-link">Inventário</a>
        <a href="./alunos.html" class="nav-link">Alunos</a>
        <a href="./cursos.html" class="nav-link">Cursos</a>
        <a href="./turmas.html" class="nav-link active">Turmas</a>
        <a href="./cobrancas.html" class="nav-link">Cobranças</a>
        <a href="./pagamentos.html" class="nav-link">Pagamentos</a>
        <a href="./dividas.html" class="nav-link">Dívidas</a>
      </nav>

      <button id="logout-btn" class="btn btn-ghost sidebar-logout">
        Terminar sessão
      </button>
    </aside>

    <!-- MAIN -->
    <div class="app-main">

      <div id="mobile-backdrop" class="mobile-backdrop"></div>

      <!-- TOPBAR -->
      <header class="topbar">
        <div>
          <h1>Turmas</h1>
          <p class="page-subtitle">Gestão de turmas</p>
        </div>

        <div class="topbar-actions">
          <button id="menu-toggle" class="menu-toggle" type="button">
            ☰ Menu
          </button>

          <div class="topbar-user">
            <span id="user-name">Utilizador</span>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="page-content">

        <article class="panel">

          <!-- HEADER -->
          <div class="panel-header panel-header-inline">
            <h3>Lista de turmas</h3>

            <div class="toolbar">
              <input
                type="text"
                id="search-turmas"
                class="search-input"
                placeholder="Pesquisar turmas..."
              />

              <button id="btn-nova-turma" class="btn btn-primary">
                Nova turma
              </button>
            </div>
          </div>

          <!-- FORM -->
          <div id="turma-form-container" class="panel-body hidden">
            <form id="turma-form" class="form-grid">

              <input type="hidden" id="turma-id" />

              <div class="form-group">
                <label for="turma-curso-id">Curso</label>
                <select id="turma-curso-id" required></select>
              </div>

              <div class="form-group">
                <label for="turma-nome">Nome da turma</label>
                <input id="turma-nome" type="text" required />
              </div>

              <div class="form-group">
                <label for="turma-codigo">Código</label>
                <input id="turma-codigo" type="text" />
              </div>

              <div class="form-group">
                <label for="turma-periodo">Período</label>
                <input id="turma-periodo" type="text" placeholder="Manhã / Tarde / Noite" />
              </div>

              <div class="form-group">
                <label for="turma-ano">Ano</label>
                <input id="turma-ano" type="number" />
              </div>

              <div class="form-group">
                <label for="turma-capacidade">Capacidade</label>
                <input id="turma-capacidade" type="number" min="0" value="0" />
              </div>

              <div class="form-group">
                <label for="turma-data-inicio">Data de início</label>
                <input id="turma-data-inicio" type="date" />
              </div>

              <div class="form-group">
                <label for="turma-data-fim">Data de fim</label>
                <input id="turma-data-fim" type="date" />
              </div>

              <div class="form-group form-group-full">
                <label for="turma-status">Status</label>
                <select id="turma-status">
                  <option value="active">Activo</option>
                  <option value="closed">Fechado</option>
                  <option value="cancelled">Cancelado</option>
                </select>
              </div>

              <div class="form-actions form-group-full">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="button" id="btn-cancelar-turma" class="btn btn-secondary">Cancelar</button>
              </div>

            </form>
          </div>

          <!-- TABLE -->
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Turma</th>
                  <th>Curso</th>
                  <th>Período</th>
                  <th>Ano</th>
                  <th>Capacidade</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>

              <tbody id="turmas-table-body">
                <tr>
                  <td colspan="7" class="empty-cell">
                    A carregar turmas...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

        </article>

      </main>
    </div>
  </div>

<script type="module" src="./assets/js/core/app.js"></script>

</body>
</html>
