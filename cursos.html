<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KEYLON | Cursos</title>

  <link rel="stylesheet" href="./assets/css/tokens.css" />
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
</head>

<body>
  <div class="app-shell">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-badge">KEYLON</span>
        <h2>Instituto</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./alunos.html" class="nav-link">Alunos</a>
        <a href="./cursos.html" class="nav-link active">Cursos</a>
        <a href="./turmas.html" class="nav-link">Turmas</a>
        <a href="./cobrancas.html" class="nav-link">Cobranças</a>
        <a href="./pagamentos.html" class="nav-link">Pagamentos</a>
        <a href="./dividas.html" class="nav-link">Dívidas</a>
      </nav>

      <button id="logout-btn" class="btn btn-ghost sidebar-logout">
        Terminar sessão
      </button>
    </aside>

    <!-- MAIN -->
    <div class="app-main">
      
      <div id="mobile-backdrop" class="mobile-backdrop"></div>

      <!-- TOPBAR -->
      <header class="topbar">
        <div>
          <h1>Cursos</h1>
          <p class="page-subtitle">Gestão de cursos do instituto</p>
        </div>

        <div class="topbar-actions">
          <button id="menu-toggle" class="menu-toggle" type="button">
            ☰ Menu
          </button>

          <div class="topbar-user">
            <span id="user-name">Utilizador</span>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="page-content">

        <!-- FORM + LIST -->
        <section class="split-layout">

          <!-- FORM -->
          <article class="panel">
            <div class="panel-header">
              <h3>Novo curso</h3>
            </div>

            <div class="panel-body">
              <form id="courseForm" class="form-grid">

                <div class="form-group">
                  <label for="course-name">Nome</label>
                  <input id="course-name" name="name" type="text" required />
                </div>

                <div class="form-group">
                  <label for="course-code">Código</label>
                  <input id="course-code" name="code" type="text" />
                </div>

                <div class="form-group">
                  <label for="course-duration">Duração (meses)</label>
                  <input id="course-duration" name="duration_months" type="number" min="1" />
                </div>

                <div class="form-group">
                  <label for="course-price">Preço base</label>
                  <input id="course-price" name="price" type="number" step="0.01" />
                </div>

                <div class="form-group form-group-full">
                  <label for="course-description">Descrição</label>
                  <textarea id="course-description" name="description" rows="3"></textarea>
                </div>

                <div class="form-actions form-group-full">
                  <button type="submit" class="btn btn-primary">Guardar</button>
                  <button type="button" id="course-reset-btn" class="btn btn-secondary">Limpar</button>
                </div>

              </form>
            </div>
          </article>

          <!-- LIST -->
          <article class="panel">
            <div class="panel-header panel-header-inline">
              <h3>Lista de cursos</h3>

              <div class="toolbar">
                <input
                  type="text"
                  id="courseSearch"
                  placeholder="Pesquisar curso..."
                  class="search-input"
                />
              </div>
            </div>

            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Código</th>
                    <th>Duração</th>
                    <th>Preço</th>
                    <th>Ações</th>
                  </tr>
                </thead>

                <tbody id="coursesTableBody">
                  <tr>
                    <td colspan="5" class="empty-cell">
                      A carregar cursos...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </article>

        </section>

      </main>
    </div>
  </div>

<script type="module" src="./assets/js/core/app.js"></script>

</body>
</html>
